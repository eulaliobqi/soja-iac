name: RNASeq Pipeline – CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-nextflow:
    name: Lint Nextflow scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Nextflow dep)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Nextflow
        run: |
          curl -fsSL https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Validate main.nf syntax
        run: nextflow config main.nf -profile test

      - name: List all .nf files
        run: find . -name "*.nf" | head -30

  lint-r:
    name: Lint R scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Install lintr
        run: |
          Rscript -e "install.packages('lintr', repos='https://cloud.r-project.org')"

      - name: Lint R scripts
        run: |
          Rscript -e "
            library(lintr)
            files <- list.files('scripts', pattern='\\\\.R$', full.names=TRUE)
            files <- c(files, 'dashboard/app.R')
            lints <- lint_dir('scripts', linters = linters_with_defaults())
            if (length(lints) > 0) {
              print(lints)
            } else {
              cat('No lint issues found.\n')
            }
          "

  validate-structure:
    name: Validate project structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          REQUIRED=(
            "main.nf"
            "nextflow.config"
            "params.yaml"
            "samplesheet.csv"
            "setup.sh"
            "run_pipeline.sh"
            "modules/qc.nf"
            "modules/trimming.nf"
            "modules/alignment.nf"
            "modules/quantification.nf"
            "modules/splicing.nf"
            "modules/analysis.nf"
            "scripts/01_deseq2.R"
            "scripts/02_enrichment.R"
            "scripts/03_wgcna.R"
            "scripts/04_integration.R"
            "dashboard/app.R"
            "report/rnaseq_report.qmd"
            "envs/rnaseq-tools.yml"
            "envs/r-analysis.yml"
          )
          ALL_OK=true
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ MISSING: $f"
              ALL_OK=false
            fi
          done
          $ALL_OK || exit 1

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml, sys

          for f in ['params.yaml', 'envs/rnaseq-tools.yml', 'envs/r-analysis.yml']:
            try:
              with open(f) as fh:
                yaml.safe_load(fh)
              print(f'✓ {f}')
            except Exception as e:
              print(f'✗ {f}: {e}')
              sys.exit(1)
          "

      - name: Validate samplesheet CSV
        run: |
          python3 -c "
          import csv, sys

          with open('samplesheet.csv') as f:
            reader = csv.DictReader(f)
            required_cols = {'sample', 'fastq_1', 'fastq_2', 'condition', 'replicate'}
            cols = set(reader.fieldnames or [])
            missing = required_cols - cols
            if missing:
              print(f'Samplesheet faltando colunas: {missing}')
              sys.exit(1)
            rows = list(reader)
            print(f'✓ samplesheet.csv ({len(rows)} amostras, colunas: {cols})')
          "
