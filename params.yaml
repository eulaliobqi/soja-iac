# ============================================================
# Parâmetros da análise – edite AQUI antes de rodar
# ============================================================

# --- Inputs principais ---
samplesheet: "samplesheet.csv"
genome_fasta: "/path/to/Gmax_508_v4.0.fa"
genome_gff3:  "/path/to/Gmax_508_Wm82.a4.v1.gene_exons.gff3"
genome_gtf:   null   # deixe null para converter automaticamente do GFF3
genome_index: null   # deixe null para construir o índice automaticamente

# --- Diretório de resultados ---
outdir: "results"

# --- Contraste DESeq2 ---
contrast:        "treatment_vs_control"
control_group:   "control"
treatment_group: "treatment"

# --- Critérios de filtragem ---
padj_cutoff: 0.05
lfc_cutoff:  1.0

# --- featureCounts ---
# 0 = unstranded | 1 = forward-stranded | 2 = reverse-stranded | -1 = auto-detect
strandedness: -1
feature_type: "exon"
gene_attr:    "gene_id"

# --- rMATS ---
read_length: 150         # comprimento das reads após trimagem
rmats_type:  "paired"    # paired (paired-end) ou single (single-end)

# --- HISAT2 ---
hisat2_threads:    8
hisat2_max_intron: 500000

# --- fastp ---
min_length: 36
quality:    20

# --- Organismo KEGG ---
kegg_organism: "gma"     # Glycine max

# --- Relatório ---
report_title:  "RNASeq Insight – Glycine max"
report_author: "Eulalio Santos"
