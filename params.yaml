# ============================================================
# Parâmetros da análise – Glycine max | IAC100 vs BR16
# ============================================================

# --- Inputs principais ---
samplesheet:  "samplesheet.csv"
genome_fasta: "/home/eulalio/soja/soja-iac/genome/gmax-genome.fa"
genome_gff3:  "/home/eulalio/soja/soja-iac/genome/gmax-annot.gff3"
genome_gtf:   null   # null = converter automaticamente do GFF3
genome_index: null   # null = construir índice automaticamente

# --- Diretório de resultados ---
outdir: "results"

# --- Contraste DESeq2 ---
contrast:        "IAC100_vs_BR16"
control_group:   "control"
treatment_group: "treatment"

# --- Critérios de filtragem ---
padj_cutoff: 0.05
lfc_cutoff:  1.0

# --- featureCounts ---
# 0 = unstranded | 1 = forward-stranded | 2 = reverse-stranded | -1 = auto-detect
strandedness: -1
feature_type: "exon"
gene_attr:    "gene_id"

# --- fastp (trimagem) ---
min_length: 36
quality:    20

# --- rMATS ---
read_length: 150         # comprimento das reads após trimagem
rmats_type:  "paired"    # paired (paired-end) ou single (single-end)

# --- HISAT2 ---
hisat2_threads:    16
hisat2_max_intron: 500000

# --- Organismo KEGG ---
kegg_organism: "gma"     # Glycine max

# --- Relatório ---
report_title:  "RNASeq Insight – Glycine max (IAC100 vs BR16)"
report_author: "Eulalio Santos"
